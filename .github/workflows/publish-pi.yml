name: Publish pi pack
on:
  push:
    tags: ["pi-v*"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Read version from package.json
        id: version
        run: |
          set -euo pipefail
          VERSION=$(jq -r '.version' pi/package.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "ERROR: pi/package.json is missing a 'version' field"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build files list from package.json
        id: files
        run: |
          set -euo pipefail
          {
            echo "package.json"
            [ -f "pi/README.md" ] && echo "README.md"
            jq -r '.artifacts[].path' "pi/package.json"
          } | sort -u > /tmp/files.txt
          {
            echo "files<<EOF"
            cat /tmp/files.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: always-further/agent-sign@c9426f1a00f823dd53e7b9068d910a68b43e49e9 # v0.0.11
        with:
          publish: "true"
          package-name: pi
          package-namespace: always-further
          package-version: ${{ steps.version.outputs.version }}
          package-path: pi
          registry-url: https://registry.nono.sh/api/v1
          files: ${{ steps.files.outputs.files }}
