name: Publish claude-autoresearch pack
on:
  push:
    tags: ["claude-autoresearch-v*"]
  workflow_dispatch:

# Inlined (rather than calling a reusable _publish.yml) so the OIDC
# `job_workflow_ref` claim is this workflow's path, matching the
# trusted-publisher entry exactly. See docs/cli/features/package-publishing.mdx
# for the design discussion.
permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#claude-autoresearch-v}" >> "$GITHUB_OUTPUT"

      - name: Build files list from package.json
        id: files
        run: |
          set -euo pipefail
          # Always include the manifest itself; conditionally include
          # README.md if present. Everything else comes from
          # `artifacts[].path` so the manifest is the source of truth.
          {
            echo "package.json"
            [ -f "claude-autoresearch/README.md" ] && echo "README.md"
            jq -r '.artifacts[].path' "claude-autoresearch/package.json"
          } | sort -u > /tmp/files.txt
          {
            echo "files<<EOF"
            cat /tmp/files.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: always-further/agent-sign@38b94e4e4d2c1b33ad5b8e7c4946e2e77fce7d0a
        with:
          publish: "true"
          package-name: claude-autoresearch
          package-namespace: Kexin-xu-01
          package-version: ${{ steps.version.outputs.version }}
          package-path: claude-autoresearch
          registry-url: https://registry.nono.sh/api/v1
          files: ${{ steps.files.outputs.files }}
