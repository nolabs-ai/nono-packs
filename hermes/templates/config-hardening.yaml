# Hermes hardening patch for sessions launched under nono.
# Installed with nono's yaml_merge wiring into ~/.hermes/config.yaml.
# YAML sequences are replaced as leaves by the merge engine, so keep
# existing plugin/blocklist entries here if you maintain local additions.

plugins:
  enabled:
    - nono-sandbox

approvals:
  mode: manual
  timeout: 60

security:
  redact_secrets: true
  tirith_enabled: true
  tirith_fail_open: false
  allow_private_urls: false
  website_blocklist:
    enabled: true
    domains:
      - "*.internal"
      - "*.local"
      - "metadata.google.internal"
      - "metadata.goog"

skills:
  guard_agent_created: true
